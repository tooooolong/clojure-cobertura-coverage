name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy to Clojars
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOJARS_USERNAME: tooooolong
      CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
      CLOJARS_TOKEN_SCOPE: org.clojars.tooooolong/*

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Set up Leiningen
        uses: DeLaGuardo/setup-clojure@13
        with:
          lein: latest

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-release-${{ hashFiles('project.clj') }}
          restore-keys: |
            ${{ runner.os }}-maven-release-
            ${{ runner.os }}-maven-

      - name: Derive version from tag
        id: version
        # GITHUB_REF_NAME is the tag that triggered this workflow (e.g. v0.2.0).
        # Strip the leading 'v' to get a plain semver string.
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set project version in project.clj
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PYEOF'
          import re, os
          ver = os.environ['RELEASE_VERSION']
          text = open('project.clj').read()
          text = re.sub(r'(defproject\s+\S+\s+)"[^"]+"',
                        r'\g<1>"' + ver + '"', text)
          open('project.clj', 'w').write(text)
          print('Project version set to', ver)
          PYEOF

      - name: Verify version in project.clj
        run: head -1 project.clj

      - name: Verify project coordinates match token scope
        run: |
          python3 - <<'PYEOF'
          import os
          import re
          import sys

          text = open("project.clj").read()
          match = re.search(r'defproject\s+([^\s"]+)\s+"([^"]+)"', text)
          if not match:
            print("Unable to parse defproject coordinates from project.clj", file=sys.stderr)
            sys.exit(1)

          coordinates = match.group(1)
          scope = os.environ["CLOJARS_TOKEN_SCOPE"]
          scope_prefix = scope[:-1] if scope.endswith("*") else scope

          print("Release coordinates:", coordinates)
          print("Configured token scope:", scope)

          if not coordinates.startswith(scope_prefix):
            print(
              "CLOJARS_DEPLOY_TOKEN scope does not allow deploying these coordinates. "
              "Mint a token for the current project coordinates or migrate the published coordinates first.",
              file=sys.stderr,
            )
            sys.exit(1)
          PYEOF

      - name: Deploy to Clojars
        run: lein deploy clojars
