name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.build-tool }}, Clojure ${{ matrix.clojure.version }}, Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [11, 17, 21]
        build-tool: [lein, clj]
        clojure:
          - version: '1.10.0'
          - version: '1.11.1'
          - version: '1.12.0'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Clojure tooling
        uses: DeLaGuardo/setup-clojure@13
        with:
          lein: latest
          cli: latest

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ matrix.build-tool }}-${{ matrix.clojure.version }}-${{ hashFiles('project.clj', 'deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ matrix.build-tool }}-${{ matrix.clojure.version }}-
            ${{ runner.os }}-maven-${{ matrix.build-tool }}-
            ${{ runner.os }}-maven-

      # ── Leiningen ─────────────────────────────────────────────────────────
      # Pin the Clojure version by rewriting project.clj in place. The
      # workspace is ephemeral per CI run so the change is never persisted.
      - name: Pin Clojure version in project.clj
        if: matrix.build-tool == 'lein'
        env:
          CLJ_VER: ${{ matrix.clojure.version }}
        run: |
          python3 - <<'PYEOF'
          import re, os
          ver = os.environ['CLJ_VER']
          text = open('project.clj').read()
          text = re.sub(r'\[org\.clojure/clojure "[^"]+"\]',
                        '[org.clojure/clojure "' + ver + '"]', text)
          open('project.clj', 'w').write(text)
          print('Clojure pinned to', ver)
          PYEOF

      - name: Run tests (lein)
        if: matrix.build-tool == 'lein'
        run: lein test

      - name: Run coverage (lein)
        if: matrix.build-tool == 'lein'
        run: lein cloverage --custom-report cloverage.coverage.cobertura/report

      # ── Clojure CLI ───────────────────────────────────────────────────────
      # -Sdeps injects the desired Clojure version. tools.deps selects the
      # highest declared version, effectively pinning it for the run.
      - name: Run tests (clj)
        if: matrix.build-tool == 'clj'
        env:
          CLJ_VER: ${{ matrix.clojure.version }}
        run: |
          clj -Sdeps "{:deps {org.clojure/clojure {:mvn/version \"$CLJ_VER\"}}}" \
              -M:test

      - name: Run coverage (clj)
        if: matrix.build-tool == 'clj'
        env:
          CLJ_VER: ${{ matrix.clojure.version }}
        run: |
          clj -Sdeps "{:deps {org.clojure/clojure {:mvn/version \"$CLJ_VER\"}}}" \
              -M:coverage

      # ── Verify output ─────────────────────────────────────────────────────
      - name: Verify cobertura.xml is present and valid XML
        run: |
          test -f target/coverage/cobertura.xml
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/coverage/cobertura.xml')
          root = tree.getroot()
          assert root.tag == 'coverage', f'Expected <coverage>, got <{root.tag}>'
          print('cobertura.xml is valid — root element:', root.tag)
          print('  line-rate:', root.attrib.get('line-rate'))
          print('  packages :', len(root.findall('.//package')))
          print('  classes  :', len(root.findall('.//class')))
          PYEOF

      - name: Upload cobertura.xml
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.build-tool }}-clj${{ matrix.clojure.version }}-java${{ matrix.java }}
          path: target/coverage/cobertura.xml
          if-no-files-found: warn
